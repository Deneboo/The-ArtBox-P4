services:
  php:
    build: .
    volumes:
      - .:/var/www/html
      - ./php/conf.d/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    restart: unless-stopped

  web:
    image: nginx:latest
    ports:
      - "8889:80"
    volumes:
      - .:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: artbox
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"